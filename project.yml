name: Chemie
options:
  bundleIdPrefix: com.dushin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_PREVIEWS: YES
    DEVELOPMENT_TEAM: "286LKF859M"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Chemie:
    type: application
    platform: iOS
    sources:
      - path: Chemie
    dependencies:
      - sdk: WeatherKit.framework
      - sdk: CoreLocation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.Chemie
        PRODUCT_NAME: Chemie
        INFOPLIST_FILE: Chemie/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Chemie/Resources/Chemie.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets:
        - ChemieTests
      gatherCoverageData: true

  ChemieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChemieTests
    dependencies:
      - target: Chemie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.Chemie.Tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO
schemes:
  Chemie:
    build:
      targets:
        Chemie: all
        ChemieTests: [test]
    test:
      targets:
        - ChemieTests
    run:
      config: Debug
